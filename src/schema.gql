type Book {
  title: String
  author: Author
}

type Author {
  name: String
  books: [Book]
}

type Query {
  books: [Book]
  authors: [Author]
  greet(names: [String!]!): [String]
  greetDotNet(names: [String!]!): [String]
  getAge(name: String!): Int
}

type Mutation {
  addBook(title: String, author: String): Book
}